body{

canvas{

/* LOADER */
.loader{
  position:fixed;

  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  letter-spacing:4px;

@keyframes fadeOut{

}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  text-decoration: none;
}

/* LEFT SIDE */

}

/* LOGO */

}

.hunny-logo{

  height:30px;
  object-fit:cover;
  border-radius:50%;
}

/* NAV LINKS */
.nav-links{
  display:flex;
  gap:12px;
}

.nav-links a{
  font-size:13px;
  opacity:0.8;
  text-decoration: none;
  color: aliceblue;
}

.nav-links a:hover{opacity:1;}
/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{

}

.hero p{
  opacity:0.7;
  margin-top:10px;
}

/* REELS GRID */
.reels{
  padding:80px 50px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

/* CARD */
.reel{
  position:relative;
  aspect-ratio:9/16;
  border-radius:16px;
  overflow:hidden;
  background:#111;
  transition:0.3s;
}

.reel:hover{
  transform:scale(1.05);
}

/* VIDEO */
.reel video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SOUND BUTTON */
.sound-btn{
  position:absolute;
  bottom:12px;
  right:12px;
  background:rgba(0,0,0,0.6);
  padding:8px;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
}

/* FOOTER */
footer{
  padding:40px 20px;
  text-align:center;
  background:rgba(255,255,255,0.03);
  border-top:1px solid rgba(255,255,255,0.08);
}

footer p{
  opacity:0.6;
  font-size:14px;
  margin-top:5px;
}

/* RESPONSIVE */
@media(max-width:1024px){
  .reels{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:320px){
  nav{
    padding:15px 20px;
    justify-content: center;

}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({
  antialias:true,
  alpha:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

// OBJECT
const geometry = new THREE.SphereGeometry(1,48,48);
const material = new THREE.MeshStandardMaterial({
  color:0x4f46e5,
  metalness:0.8,
  roughness:0.2
});
const sphere = new THREE.Mesh(geometry,material);
scene.add(sphere);

// CURSOR FOLLOW (ARROW STYLE)
let mouse = new THREE.Vector2();

window.addEventListener("mousemove",(e)=>{
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// ANIMATION
function animate(){
  requestAnimationFrame(animate);

  // 3D direction vector
  const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
  vector.unproject(camera);

  // object cursor ki direction me dekhega
  sphere.lookAt(vector);

  // slight floating motion
  sphere.position.x += (mouse.x * 1.5 - sphere.position.x) * 0.05;
  sphere.position.y += (mouse.y * 1.5 - sphere.position.y) * 0.05;

  sphere.rotation.y += 0.002;

  renderer.render(scene,camera);
}
animate();

// RESIZE
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>



<script>
// AUTO PLAY (VISIBLE ONLY)
const videos = document.querySelectorAll("video");

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.play();
    } else {
      entry.target.pause();
    }
  });
},{threshold:0.6});

videos.forEach(v=>observer.observe(v));

// SOUND TOGGLE
document.querySelectorAll(".sound-btn").forEach((btn,i)=>{
  btn.addEventListener("click", ()=>{
    const video = videos[i];
    video.muted = !video.muted;
    btn.textContent = video.muted ? "🔇" : "🔊";
  });
});
</script>
